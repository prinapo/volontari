name: Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - run: npm run lint && npm run lint:css
        name: Lint (ESLint + Stylelint)

      - run: npm run build
        name: Build

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [quality]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps

      - run: npm run build
        name: Build for E2E

      - run: npx playwright test --config tests/e2e/playwright.config.js
        name: Run E2E tests

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
